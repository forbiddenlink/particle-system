<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <title>Nova Particles - GPU Particle System Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      canvas {
        display: block;
      }
      
      #info {
        position: absolute;
        top: 20px;
        left: 20px;
        color: #fff;
        font-size: 14px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px 20px;
        border-radius: 8px;
        max-width: 300px;
      }
      
      #info h1 {
        font-size: 18px;
        margin-bottom: 10px;
        color: #8b5cf6;
      }
      
      #info p {
        margin-bottom: 8px;
        opacity: 0.9;
      }
      
      #stats {
        position: absolute;
        top: 20px;
        right: 20px;
        color: #fff;
        font-size: 14px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px 20px;
        border-radius: 8px;
        font-family: monospace;
      }
      
      .stat-value {
        color: #22c55e;
        font-weight: bold;
      }
      
      #controls {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
        z-index: 100;
      }
      
      button {
        background: #8b5cf6;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }
      
      button:hover {
        background: #7c3aed;
      }
      
      input[type="range"] {
        width: 150px;
        margin-left: 10px;
        vertical-align: middle;
      }
      
      label {
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 15px;
        border-radius: 6px;
      }

      #presets {
        position: absolute;
        bottom: 80px;
        left: 20px;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 100;
        color: #fff;
        background: rgba(0, 0, 0, 0.7);
        padding: 10px 15px;
        border-radius: 6px;
      }

      #presets button {
        padding: 6px 12px;
        font-size: 12px;
      }

      #preset-fire { background: #ef4444; }
      #preset-fire:hover { background: #dc2626; }
      #preset-smoke { background: #6b7280; }
      #preset-smoke:hover { background: #4b5563; }
      #preset-magic { background: #a855f7; }
      #preset-magic:hover { background: #9333ea; }
      #preset-rainbow { background: linear-gradient(90deg, #ef4444, #f59e0b, #22c55e, #3b82f6, #a855f7); }
      #preset-rainbow:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div id="info">
      <h1>🌟 Nova Particles</h1>
      <p>GPU-accelerated particle system using WebGPU compute shaders.</p>
      <p>Rendering <span id="particle-count" class="stat-value">0</span> particles entirely on the GPU.</p>
    </div>
    
    <div id="stats">
      <div>FPS: <span id="fps" class="stat-value">0</span></div>
      <div>Backend: <span id="backend" class="stat-value">detecting...</span></div>
    </div>
    
    <div id="controls">
      <button id="reset-btn">Reset</button>
      <label>
        Particles:
        <input type="range" id="particle-slider" min="1000" max="500000" value="50000" step="1000" />
        <span id="particle-slider-value">50,000</span>
      </label>
      <label>
        Gravity:
        <input type="range" id="gravity-slider" min="-20" max="20" value="-10" step="0.5" />
      </label>
      <label>
        Drag:
        <input type="range" id="drag-slider" min="0" max="1" value="0" step="0.05" />
      </label>
      <label>
        Wind:
        <input type="range" id="wind-slider" min="-10" max="10" value="0" step="0.5" />
      </label>
      <label>
        Vortex:
        <input type="range" id="vortex-slider" min="-10" max="10" value="0" step="0.5" />
      </label>
      <label>
        <input type="checkbox" id="trails-checkbox" />
        Trails
      </label>
    </div>

    <div id="presets">
      <span>Effects:</span>
      <button id="preset-default">Default</button>
      <button id="preset-fire">Fire</button>
      <button id="preset-smoke">Smoke</button>
      <button id="preset-magic">Magic</button>
      <button id="preset-rainbow">Rainbow</button>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
