<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Branding -->
    <title>Nova Particles - Next-Gen GPU Particle System</title>
    <meta
      name="description"
      content="Experience a high-performance, GPU-accelerated particle system running entirely in your browser using WebGPU. Create fire, smoke, and magic effects."
    />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Nova Particles - Next-Gen GPU Particle System"
    />
    <meta
      property="og:description"
      content="Interactive 3D particle simulation powered by WebGPU. 1 million+ particles in your browser."
    />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="https://nova-particles.demo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nova Particles - WebGPU Demo" />
    <meta
      name="twitter:description"
      content="Interactive 3D particle simulation powered by WebGPU."
    />
    <meta name="twitter:image" content="/og-image.jpg" />
  </head>
  <body>
    <div id="info" class="panel">
      <h1>✨ Nova Particles</h1>
      <p>Next-gen particle system powered by WebGPU compute shaders.</p>
      <p>
        Simulating
        <span id="particle-count" class="stat-value">0</span> particles.
      </p>
    </div>

    <div id="stats" class="panel">
      <div>FPS: <span id="fps" class="stat-value">0</span></div>
      <div>
        Backend: <span id="backend" class="stat-value">detecting...</span>
      </div>
    </div>

    <div id="controls" role="group" aria-label="Particle system controls">
      <button id="reset-btn" class="btn" aria-label="Reset particle system">
        Reset
      </button>

      <div class="control-group">
        <label for="particle-slider">Count</label>
        <input
          type="range"
          id="particle-slider"
          min="1000"
          max="1000000"
          value="50000"
          step="1000"
          aria-label="Particle count"
        />
        <span
          id="particle-slider-value"
          style="min-width: 60px; text-align: right"
          >50,000</span
        >
      </div>

      <div class="control-group">
        <label for="gravity-slider">Gravity</label>
        <input
          type="range"
          id="gravity-slider"
          min="-20"
          max="20"
          value="-10"
          step="0.5"
          aria-label="Gravity"
        />
      </div>

      <div class="control-group">
        <label for="drag-slider">Drag</label>
        <input
          type="range"
          id="drag-slider"
          min="0"
          max="1"
          value="0"
          step="0.05"
          aria-label="Drag"
        />
      </div>

      <div class="control-group">
        <label for="wind-slider">Wind</label>
        <input
          type="range"
          id="wind-slider"
          min="-10"
          max="10"
          value="0"
          step="0.5"
          aria-label="Wind"
        />
      </div>

      <div class="control-group">
        <label for="vortex-slider">Vortex</label>
        <input
          type="range"
          id="vortex-slider"
          min="-10"
          max="10"
          value="0"
          step="0.5"
          aria-label="Vortex"
        />
      </div>

      <div class="control-group">
        <label for="trails-checkbox" style="cursor: pointer">Trails</label>
        <input type="checkbox" id="trails-checkbox" />
      </div>
    </div>

    <div id="presets" role="group" aria-label="Effect presets">
      <button
        id="preset-default"
        class="preset-btn"
        aria-label="Apply default effect"
      >
        Default
      </button>
      <button
        id="preset-fire"
        class="preset-btn"
        id="preset-fire"
        aria-label="Apply fire effect"
      >
        Fire
      </button>
      <button
        id="preset-smoke"
        class="preset-btn"
        id="preset-smoke"
        aria-label="Apply smoke effect"
      >
        Smoke
      </button>
      <button
        id="preset-magic"
        class="preset-btn"
        id="preset-magic"
        aria-label="Apply magic effect"
      >
        Magic
      </button>
      <button
        id="preset-rainbow"
        class="preset-btn"
        id="preset-rainbow"
        aria-label="Apply rainbow effect"
      >
        Rainbow
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
